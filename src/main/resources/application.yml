spring:
  application:
    name: greenify

  # Run local development with dev profile by default.
  profiles:
    default: dev

  # Database Configuration
  # Local: H2 in-memory (default)
  # Docker: PostgreSQL (set DB_URL, DB_USER, DB_PASSWORD)
  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: true
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        format_sql: false
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      schema-locations: classpath:db/init/postgresql-schema.sql
      continue-on-error: true

  # H2 Console (only for local development)
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

  # Redis Configuration (Docker only)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope:
              - email
              - profile

  # Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:placeholder}
    password: ${MAIL_PASSWORD:placeholder}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
jwt:
  secret-key: ${JWT_SECRET:cmVhZGVyYXJtYWlycGxhbmVidXNobW9vbnNoYWRlY29uc3RhbnRseWV2ZXJ5b25lZGk=}
  expiration: 86400000
  refresh-token-expiration: 604800000

# Domain URL
domain:
  url: ${DOMAIN_URL:http://localhost:3000}
  cloud-front: ${CLOUDFRONT_URL:placeholder}

goong:
  api-key: ${GOONG_API_KEY:}
  geocode-url: ${GOONG_GEOCODE_URL:https://rsapi.goong.io/v2/geocode}
  timeout-millis: ${GOONG_TIMEOUT_MILLIS:2500}

# AWS S3 Configuration
storage:
  access-key: ${AWS_ACCESS_KEY:placeholder}
  secret-key: ${AWS_SECRET_KEY:placeholder}
  bucket-name: ${AWS_BUCKET:greenify-images-942004241415-ap-southeast-1-an}
